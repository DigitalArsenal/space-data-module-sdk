name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install native toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y emscripten flatbuffers-compiler libflatbuffers-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm test
      - run: npm run check:compliance
      - run: npm publish
